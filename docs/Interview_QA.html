<tr><td>Try-On</td><td>Python FastAPI</td><td>AI Virtual Try-On (GPU)</td></tr></table>
<p>Backend theo mô hình <b>Domain-Driven Design (DDD)</b> với 16 module nghiệp vụ: <code>auth</code>, <code>fabric</code>, <code>order</code>, <code>billing</code>, <code>flashsale</code>, <code>gamification</code>, <code>notification</code>, <code>appointment</code>, <code>cart</code>, <code>event</code>, <code>favorite</code>, <code>measurement</code>, <code>product</code>, <code>promotion</code>, <code>review</code>, <code>user</code>.</p>`},

<p>Một số module phức tạp hơn còn thêm: <code>event/</code> (Domain events) và <code>listener/</code> (Event listeners xử lý async).</p>

<ul><li><b>Separation of Concerns</b>: Mỗi module độc lập, dễ maintain</li>

<pre><code>@RestControllerAdvice
public class GlobalExceptionHandler {
    private ResponseEntity&lt;CommonResponse&lt;Object&gt;&gt; buildError(
        HttpStatus status, String code, String message) {
        String traceId = TraceIdUtil.getOrCreateTraceId();
        return ResponseEntity.status(status)

}</code></pre>
<table><tr><th>Exception</th><th>HTTP Status</th><th>Mục đích</th></tr>

<p><b>Điểm đặc biệt:</b> Mọi response có <code>traceId</code> để debug production. <code>BusinessException</code> sử dụng enum <code>ErrorCode</code> chứa cả HTTP status và error code.</p>`},

<table><tr><th>Loại</th><th>Thời hạn</th><th>Claims</th><th>Mục đích</th></tr>
<tr><td>Access Token</td><td>30 phút</td><td><code>roles</code>, <code>type: "access"</code></td><td>API authentication</td></tr>
<tr><td>Refresh Token</td><td>7 ngày</td><td><code>type: "refresh"</code></td><td>Lấy access token mới</td></tr></table>
<h4>Security features:</h4>
<ul><li><b>JTI (JWT ID)</b>: Mỗi token có UUID riêng → support revocation</li>
<li><b>HMAC SHA-256</b>: Signing key tối thiểu 32 bytes</li>
<li><b>Token type claim</b>: Phân biệt access vs refresh</li></ul>
<h4>Validation flow (JwtAuthFilter):</h4>
<ol><li>Extract <code>Authorization: Bearer &lt;token&gt;</code> từ header</li>
<li>Parse JWT, extract username</li>
<li>Load UserDetails từ database</li>
<li>Validate: username khớp + chưa hết hạn</li>
<li>Set <code>SecurityContextHolder</code> authentication</li></ol>`},

                    {
                        q: "SecurityConfig cấu hình những gì?", a: `<ul>
<li><b>CSRF disabled</b> — stateless REST API không cần CSRF</li>
<li><b>CORS</b> — origins từ <code>application.yml</code> (comma-separated)</li>
<li><b>Session STATELESS</b> — dùng JWT thay session</li>
<li><b>Security Headers</b>: chống MIME sniffing, clickjacking (<code>frameOptions.deny()</code>), XSS, cache control</li>
<li><b>Authorization Rules</b>:
  <ul><li><code>/api/v1/auth/**</code> → permitAll</li>
  <li><code>/ws/**</code> → permitAll (WebSocket)</li>
  <li><code>GET /api/v1/products/**</code> → permitAll (catalog)</li>

<li><b>Password</b>: BCryptPasswordEncoder</li>
<li><b>JWT Filter</b>: Thêm trước <code>UsernamePasswordAuthenticationFilter</code></li></ul>`},

<li><code>LoginAttemptService</code> kiểm tra account bị lock chưa</li>
<li><code>AuthenticationManager</code> xác thực (BCrypt compare)</li>
<li>Thành công → reset attempt counter → generate Access + Refresh Token → log audit</li>
<li>Thất bại → tăng attempt counter → throw <code>BadCredentialsException</code></li></ol>
<h4>Forgot Password Flow:</h4>
<ol><li>Client gửi <code>{email}</code></li>

<p><b>Tại sao SERIALIZABLE?</b> Đây là mức isolation cao nhất, đảm bảo <b>phantom reads</b> và <b>dirty reads</b> không xảy ra khi hàng trăm user cùng mua Flash Sale.</p>`},

                    {
                        q: "Reservation Pattern trong Flash Sale hoạt động thế nào? Có mấy trạng thái?", a: `<p>Flash Sale sử dụng <b>Reservation Pattern</b> để giữ hàng tạm thời trước khi thanh toán:</p>
<table><tr><th>Status</th><th>Ý nghĩa</th><th>Chuyển sang</th></tr>
<tr><td><code>ACTIVE</code></td><td>Đang giữ hàng (10 phút)</td><td>CONVERTED / EXPIRED / CANCELLED</td></tr>
<tr><td><code>CONVERTED</code></td><td>Đã thanh toán thành công</td><td>— (final)</td></tr>
<tr><td><code>EXPIRED</code></td><td>Hết thời gian giữ hàng</td><td>— (final)</td></tr>
<tr><td><code>CANCELLED</code></td><td>User hủy đơn</td><td>— (final)</td></tr></table>
<h4>Luồng hoạt động:</h4>
<pre><code>Purchase → Reservation(ACTIVE) + reservedQty↑
  ├─ confirmPayment() → Reservation(CONVERTED) + soldQty↑ + reservedQty↓
  ├─ cancelOrder()    → Reservation(CANCELLED) + reservedQty↓
  └─ timeout(10min)   → Reservation(EXPIRED) + reservedQty↓ (scheduled)</code></pre>
<p><b>Key insight:</b> Khi reservation expire, <code>@Scheduled(fixedRate = 30000)</code> sẽ tự động giải phóng stock mỗi 30 giây.</p>`},

                    {
                        q: "Flash Sale có những Scheduled Tasks nào? Tại sao cần chúng?", a: `<p><code>FlashSaleServiceImpl</code> có <b>3 scheduled tasks</b>:</p>
<table><tr><th>Task</th><th>Interval</th><th>Chức năng</th></tr>
<tr><td><code>updateFlashSaleStatuses()</code></td><td>60s</td><td>Activate SCHEDULED → ACTIVE khi đến giờ; End ACTIVE → ENDED khi hết giờ</td></tr>
<tr><td><code>releaseExpiredReservations()</code></td><td>30s</td><td>Giải phóng ACTIVE reservations đã hết hạn → cập nhật reservedQuantity</td></tr>
<tr><td><code>expirePendingOrders()</code></td><td>60s</td><td>Chuyển PENDING orders quá hạn thanh toán → EXPIRED</td></tr></table>
<p><b>Lý do cần scheduled tasks:</b></p>
<ul><li>Không thể dựa hoàn toàn vào user action (user có thể abandon)</li>
<li>Stock phải được giải phóng tự động để user khác mua</li>
<li>Flash Sale status phải chuyển đúng thời gian mà không cần admin trigger</li></ul>`},

                    {
                        q: "Khi user thanh toán Flash Sale (confirmPayment), các bước xử lý gì?", a: `<p>Method <code>confirmPayment()</code> thực hiện chuyển đổi từ reservation sang sold:</p>
<ol><li><b>Validate order</b> — Phải ở trạng thái PENDING và chưa hết hạn (<code>order.isExpired()</code>)</li>
<li><b>Convert reservation</b> — <code>ACTIVE → CONVERTED</code>, ghi <code>convertedAt</code></li>
<li><b>Update flash sale quantities</b>:
<pre><code>reservedQuantity -= order.quantity
soldQuantity += order.quantity
// Check sold out
if (availableQuantity <= 0) → status = SOLD_OUT</code></pre></li>
<li><b>Update order</b> — <code>PENDING → PAID</code>, ghi <code>paymentMethod</code> và <code>paidAt</code></li></ol>
<p><b>Atomic operation:</b> Tất cả trong cùng 1 <code>@Transactional</code> — nếu bất kỳ bước nào fail, toàn bộ rollback.</p>`}
                ]

            {
                title: "Rate Limiting & Security Audit", icon: "🛡️", questions: [
                    {
                        q: "RateLimitFilter hoạt động thế nào? Xử lý ra sao khi Redis down?", a: `<p><code>RateLimitFilter</code> extends <code>OncePerRequestFilter</code> với Redis sliding window:</p>
<pre><code>// Algorithm: Redis INCR + TTL
String key = "rate_limit:" + clientIp;
Long count = redis.opsForValue().increment(key);
if (count == 1) redis.expire(key, Duration.ofMinutes(1));
if (count > requestsPerMinute) → 429 Too Many Requests</code></pre>
<h4>Smart features:</h4>
<ul><li><b>IP whitelist</b> — Skip rate limit cho trusted IPs</li>
<li><b>Proxy-aware</b> — Đọc <code>X-Forwarded-For</code> rồi <code>X-Real-IP</code> rồi <code>getRemoteAddr()</code></li>
<li><b>API-only</b> — Chỉ check requests bắt đầu bằng <code>/api/</code></li>
<li><b>Response headers</b> — <code>X-RateLimit-Limit</code> và <code>X-RateLimit-Remaining</code></li>
<li><b>Conditional bean</b> — <code>@ConditionalOnProperty(name = "rate-limit.enabled")</code></li></ul>
<h4>Graceful degradation khi Redis down:</h4>
<pre><code>catch (Exception e) {
    // Redis down → ALLOW request but log error
    log.error("Rate limiting error (Redis may be down): {}", e.getMessage());
    filterChain.doFilter(request, response);
}</code></pre>
<p><b>Design decision:</b> Prefer availability over protection — Service vẫn chạy khi Redis unavailable.</p>`},

<pre><code>public class CustomUserDetails implements UserDetails {

        return List.of(new SimpleGrantedAuthority("ROLE_" + roleCode.toUpperCase()));

                    {
                        q: "So sánh Pessimistic Locking vs Optimistic Locking. Dự án dùng cái nào và tại sao?", a: `<table><tr><th>Tiêu chí</th><th>Pessimistic Locking</th><th>Optimistic Locking</th></tr>
<tr><td>Cơ chế</td><td><code>SELECT ... FOR UPDATE</code></td><td><code>@Version</code> column check</td></tr>
<tr><td>Lock timing</td><td>Lock ngay khi đọc</td><td>Check version khi ghi</td></tr>
<tr><td>Throughput</td><td>Thấp (block concurrent reads)</td><td>Cao (no blocking)</td></tr>
<tr><td>Conflict handling</td><td>Prevent conflicts</td><td>Detect + retry</td></tr>
<tr><td>Best for</td><td>High contention (flash sale)</td><td>Low contention (general CRUD)</td></tr></table>
<p><b>Dự án sử dụng:</b></p>
<ul><li><b>Flash Sale</b> — Pessimistic locking (<code>findByIdForUpdate()</code>) vì high contention, mỗi millisecond đều quan trọng</li>
<li><b>General entities</b> — Chưa có locking rõ ràng (potential improvement: thêm <code>@Version</code>)</li></ul>
<p><b>Trade-off:</b> Flash Sale chọn đúng vì hàng trăm user cùng mua 1 sản phẩm → pessimistic lock đảm bảo data integrity, dù giảm throughput.</p>`},

                        q: "@Transactional(readOnly = true) có tác dụng gì? Ảnh hưởng hiệu suất ra sao?", a: `<p>Dự án sử dụng class-level <code>@Transactional(readOnly = true)</code> trên <code>FlashSaleServiceImpl</code>:</p>
<pre><code>@Transactional(readOnly = true) // Class-level default
public class FlashSaleServiceImpl {
    // Queries inherit readOnly = true
    public List&lt;FlashSaleResponse&gt; getActiveSales() { ... }

    @Transactional // Override: readOnly = false cho writes
    public FlashSalePurchaseResult purchase() { ... }

    @Transactional(isolation = Isolation.SERIALIZABLE) // Override: custom isolation
    public FlashSalePurchaseResult purchase() { ... }
}</code></pre>
<h4>Tác dụng readOnly = true:</h4>
<ul><li><b>Hibernate optimization</b> — Skip dirty checking, no flush needed</li>
<li><b>DB optimization</b> — MySQL có thể route tới read replica</li>
<li><b>Connection pool</b> — Có thể dùng connection pool riêng cho reads</li>
<li><b>Safety</b> — Prevent accidental writes trong query methods</li></ul>`},

<h4>Option 1: Token qua query parameter</h4>
<pre><code>// Frontend
const socket = new SockJS('/ws?token=' + accessToken);

// Backend: HandshakeInterceptor
public class JwtHandshakeInterceptor implements HandshakeInterceptor {
    public boolean beforeHandshake(ServerHttpRequest request, ...) {
        String token = extractTokenFromQuery(request);
        if (jwtService.isTokenValid(token)) {
            attributes.put("userId", jwtService.extractUserId(token));
            return true;
        }
        return false; // Reject connection
    }
}</code></pre>

        function toggleAll(open) {
            document.querySelectorAll('.qa').forEach(el => {
                if (open) el.classList.add('open');
                else el.classList.remove('open');
            });
        }

        document.getElementById('searchBox').addEventListener('input', function () {
            const term = this.value.toLowerCase();
            document.querySelectorAll('.qa').forEach(el => {
                const text = el.textContent.toLowerCase();
                el.style.display = term && !text.includes(term) ? 'none' : '';
            });
