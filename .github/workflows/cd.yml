name: CD - Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

jobs:
  # ============================================
  # Build & Push Docker Images
  # ============================================
  build-and-push:
    name: 🚀 Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: 📝 Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: 🔨 Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || 'https://api.asao.vn/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Deploy to Staging (Optional)
  # ============================================
  deploy-staging:
    name: 🎭 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    outputs:
      deployed: ${{ steps.staging-precheck.outputs.ready }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📋 Deploy notification
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Backend image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:main"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:main"

      - name: 🔎 Check staging secrets
        id: staging-precheck
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "✅ Staging secrets found. Starting deploy."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Missing one or more staging secrets. Staging deploy will be skipped."
          fi

      - name: 🚀 Deploy via SSH
        if: steps.staging-precheck.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/tailor_shop
            git fetch origin
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete at $(date)"

      - name: ✅ Staging deployment complete
        if: steps.staging-precheck.outputs.ready == 'true'
        run: echo "Staging deployment completed! 🎉"

      - name: ⏭️ Staging deployment skipped
        if: steps.staging-precheck.outputs.ready != 'true'
        run: echo "Staging deployment skipped because required secrets are missing."

  # ============================================
  # Deploy to Production (Tags only)
  # ============================================
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📋 Production deployment info
        run: |
          echo "🌟 Deploying to PRODUCTION environment..."
          echo "Version: ${{ github.ref_name }}"
          echo "Backend image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
          
      # Uncomment and configure for your production deployment
      # Example: Deploy to Kubernetes
      # - name: 🚀 Deploy to Kubernetes
      #   uses: azure/k8s-deploy@v4
      #   with:
      #     namespace: tailor-shop
      #     manifests: |
      #       k8s/deployment.yaml
      #       k8s/service.yaml
      #     images: |
      #       ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
      #       ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}

      - name: ✅ Production deployment complete
        run: |
          echo "Production deployment completed! 🎉"
          echo "Version ${{ github.ref_name }} is now live!"

  # ============================================
  # Post-Deployment Health Check
  # ============================================
  health-check:
    name: 💓 Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && needs.deploy-staging.outputs.deployed == 'true'
    
    steps:
      - name: ⏳ Wait for deployment
        run: sleep 30

      - name: 🔍 Check Backend Health
        run: |
          curl -sf --retry 3 --retry-delay 10 ${{ secrets.STAGING_URL || 'https://api.asao.vn' }}/actuator/health || echo "⚠️ Backend health check failed (may still be starting)"

      - name: 🔍 Check Frontend Health
        run: |
          curl -sf --retry 3 --retry-delay 10 ${{ secrets.STAGING_URL || 'https://asao.vn' }}/ || echo "⚠️ Frontend health check failed (may still be starting)"

  # ============================================
  # Notify
  # ============================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, health-check]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📢 Deployment Status
        run: |
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
          
      # Uncomment for Slack notification
      # - name: 📢 Slack Notification
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: ${{ job.status }}
      #     fields: repo,commit,author,action
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
